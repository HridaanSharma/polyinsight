kind = "web"
previewPath = "/"
title = "Polymarket Intelligence Dashboard"
version = "1.0.0"
id = "artifacts/polymarket-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19122

[services.development]
run = "pnpm --filter @workspace/polymarket-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/polymarket-dashboard", "run", "build" ]
publicDir = "artifacts/polymarket-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19122"
BASE_PATH = "/"
